name: 'Deploy Documentation'

on:
  push:
    branches:
      - 'main'
    paths:
      - 'documentation/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: 'read'
  pages: 'write'
  id-token: 'write'

concurrency:
  group: 'pages'
  cancel-in-progress: false

defaults:
  run:
    shell: 'bash'
    working-directory: 'documentation'

jobs:
  build:
    name: 'Build mkdocs site'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Set up Python'
        uses: 'actions/setup-python@v5' # TODO: pin to SHA with ratchet
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: 'Install mkdocs-material'
        run: 'pip install mkdocs-material'

      - name: 'Build site'
        run: 'mkdocs build --strict'

      - name: 'Upload artifact'
        uses: 'actions/upload-pages-artifact@v3' # TODO: pin to SHA with ratchet
        with:
          path: 'documentation/site'

  deploy:
    name: 'Deploy to GitHub Pages'
    needs: 'build'
    runs-on: 'ubuntu-latest'
    environment:
      name: 'github-pages'
      url: '${{ steps.deployment.outputs.page_url }}'
    steps:
      - name: 'Deploy'
        id: 'deployment'
        uses: 'actions/deploy-pages@v4' # TODO: pin to SHA with ratchet
